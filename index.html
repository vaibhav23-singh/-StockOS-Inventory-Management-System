<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>StockOS — Inventory Management</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0d0f0f;
    --surface: #141818;
    --surface2: #1c2121;
    --surface3: #232a2a;
    --border: #2a3333;
    --border2: #344040;
    --accent: #00e5a0;
    --accent2: #00b87a;
    --accent-dim: rgba(0,229,160,0.12);
    --accent-glow: rgba(0,229,160,0.25);
    --warn: #ffb547;
    --warn-dim: rgba(255,181,71,0.12);
    --danger: #ff5f5f;
    --danger-dim: rgba(255,95,95,0.12);
    --info: #5b8fff;
    --text: #e8eaea;
    --text2: #8fa0a0;
    --text3: #5a7070;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
    --radius: 4px;
    --radius2: 8px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 14px; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; display: flex; }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 220px; min-height: 100vh; background: var(--surface);
    border-right: 1px solid var(--border); display: flex; flex-direction: column;
    position: fixed; top: 0; left: 0; bottom: 0; z-index: 100;
  }
  .sidebar-logo {
    padding: 24px 20px 20px; border-bottom: 1px solid var(--border);
  }
  .logo-mark {
    font-family: var(--mono); font-size: 18px; font-weight: 600;
    color: var(--accent); letter-spacing: -0.5px;
  }
  .logo-sub { font-size: 10px; color: var(--text3); letter-spacing: 2px; margin-top: 2px; text-transform: uppercase; font-family: var(--mono); }
  .nav { flex: 1; padding: 12px 0; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 20px; cursor: pointer; color: var(--text2);
    font-size: 13px; transition: all 0.15s; border-left: 2px solid transparent;
    font-family: var(--mono); letter-spacing: 0.3px;
  }
  .nav-item:hover { color: var(--text); background: var(--surface2); }
  .nav-item.active { color: var(--accent); border-left-color: var(--accent); background: var(--accent-dim); }
  .nav-icon { width: 16px; text-align: center; font-size: 15px; }
  .nav-section { padding: 20px 20px 6px; font-size: 10px; color: var(--text3); letter-spacing: 2px; text-transform: uppercase; font-family: var(--mono); }
  .sidebar-footer { padding: 16px 20px; border-top: 1px solid var(--border); }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); display: inline-block; margin-right: 6px; box-shadow: 0 0 6px var(--accent); }
  .status-text { font-family: var(--mono); font-size: 11px; color: var(--text3); }

  /* ── MAIN ── */
  .main { margin-left: 220px; flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
  .topbar {
    height: 56px; background: var(--surface); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 28px; position: sticky; top: 0; z-index: 50;
  }
  .page-title { font-family: var(--mono); font-size: 13px; color: var(--text2); letter-spacing: 1px; text-transform: uppercase; }
  .topbar-right { display: flex; align-items: center; gap: 12px; }
  .btn {
    display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px;
    border-radius: var(--radius); font-family: var(--mono); font-size: 12px;
    font-weight: 500; cursor: pointer; border: 1px solid transparent; transition: all 0.15s;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .btn-primary { background: var(--accent); color: #000; border-color: var(--accent); }
  .btn-primary:hover { background: var(--accent2); border-color: var(--accent2); }
  .btn-ghost { background: transparent; color: var(--text2); border-color: var(--border2); }
  .btn-ghost:hover { color: var(--text); border-color: var(--text2); }
  .btn-danger { background: transparent; color: var(--danger); border-color: var(--danger); }
  .btn-danger:hover { background: var(--danger-dim); }
  .btn-warn { background: transparent; color: var(--warn); border-color: var(--warn); }
  .btn-warn:hover { background: var(--warn-dim); }
  .content { padding: 28px; flex: 1; }

  /* ── DASHBOARD ── */
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius2);
    padding: 20px; position: relative; overflow: hidden;
  }
  .stat-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: var(--accent-color, var(--accent));
  }
  .stat-label { font-family: var(--mono); font-size: 10px; color: var(--text3); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 12px; }
  .stat-value { font-family: var(--mono); font-size: 28px; font-weight: 600; color: var(--text); }
  .stat-sub { font-size: 12px; color: var(--text3); margin-top: 4px; }
  .stat-icon { position: absolute; right: 16px; top: 16px; font-size: 24px; opacity: 0.15; }

  .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
  .chart-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius2); padding: 20px;
  }
  .chart-title { font-family: var(--mono); font-size: 11px; color: var(--text3); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 16px; }
  .chart-wrap { height: 200px; position: relative; }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius2); }
  .panel-header { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .panel-title { font-family: var(--mono); font-size: 11px; color: var(--text2); letter-spacing: 1.5px; text-transform: uppercase; }

  /* ── TABLE ── */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  th {
    padding: 10px 16px; text-align: left; font-family: var(--mono); font-size: 10px;
    color: var(--text3); letter-spacing: 1.5px; text-transform: uppercase;
    border-bottom: 1px solid var(--border); background: var(--surface2); font-weight: 500;
  }
  td { padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 13px; color: var(--text2); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface2); color: var(--text); }
  .sku { font-family: var(--mono); font-size: 11px; color: var(--text3); }
  .product-name { color: var(--text); font-weight: 500; }
  .badge {
    display: inline-flex; align-items: center; padding: 3px 8px;
    border-radius: 3px; font-family: var(--mono); font-size: 10px; letter-spacing: 0.5px;
    text-transform: uppercase; font-weight: 600;
  }
  .badge-ok { background: rgba(0,229,160,0.1); color: var(--accent); }
  .badge-warn { background: var(--warn-dim); color: var(--warn); }
  .badge-danger { background: var(--danger-dim); color: var(--danger); }
  .badge-in { background: rgba(0,229,160,0.1); color: var(--accent); }
  .badge-out { background: var(--danger-dim); color: var(--danger); }
  .badge-adj { background: rgba(91,143,255,0.12); color: var(--info); }
  .qty-cell { font-family: var(--mono); font-size: 13px; font-weight: 600; }
  .price-cell { font-family: var(--mono); font-size: 12px; }

  /* ── SEARCH & FILTERS ── */
  .toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
  .search-wrap { flex: 1; min-width: 200px; position: relative; }
  .search-wrap input { width: 100%; }
  .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 14px; }
  input, select, textarea {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 8px 12px; border-radius: var(--radius);
    font-family: var(--mono); font-size: 12px; outline: none; width: 100%;
    transition: border-color 0.15s;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  .search-wrap input { padding-left: 32px; }
  select option { background: var(--surface2); }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(2px);
  }
  .modal {
    background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius2);
    width: 540px; max-width: 95vw; max-height: 90vh; overflow-y: auto;
    animation: slideUp 0.2s ease;
  }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-header {
    padding: 20px 24px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-title { font-family: var(--mono); font-size: 13px; letter-spacing: 1px; text-transform: uppercase; color: var(--text); }
  .modal-close { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 18px; padding: 2px 6px; border-radius: 3px; }
  .modal-close:hover { color: var(--text); background: var(--surface3); }
  .modal-body { padding: 24px; }
  .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-field { display: flex; flex-direction: column; gap: 6px; }
  .form-field.full { grid-column: span 2; }
  label { font-family: var(--mono); font-size: 10px; color: var(--text3); letter-spacing: 1.5px; text-transform: uppercase; }

  /* ── TOAST ── */
  .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 2000; display: flex; flex-direction: column; gap: 8px; }
  .toast {
    background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius);
    padding: 12px 16px; font-family: var(--mono); font-size: 12px;
    display: flex; align-items: center; gap: 10px; min-width: 280px;
    animation: toastIn 0.2s ease; border-left: 3px solid var(--accent);
  }
  .toast.error { border-left-color: var(--danger); }
  .toast.warn { border-left-color: var(--warn); }
  @keyframes toastIn { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  /* ── UTILS ── */
  .flex { display: flex; }
  .gap-2 { gap: 8px; }
  .items-center { align-items: center; }
  .empty-state { padding: 48px; text-align: center; color: var(--text3); font-family: var(--mono); font-size: 13px; }
  .tag { display: inline-flex; padding: 2px 8px; border-radius: 3px; font-family: var(--mono); font-size: 10px; background: var(--surface3); color: var(--text3); }
  .loading { padding: 32px; text-align: center; color: var(--text3); font-family: var(--mono); font-size: 12px; }
  .product-row-actions { display: flex; gap: 6px; opacity: 0; transition: opacity 0.15s; }
  tr:hover .product-row-actions { opacity: 1; }
  .icon-btn { background: none; border: none; color: var(--text3); cursor: pointer; padding: 4px 8px; border-radius: 3px; font-size: 14px; }
  .icon-btn:hover { color: var(--text); background: var(--surface3); }
  .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .page-head { font-family: var(--mono); font-size: 18px; font-weight: 600; color: var(--text); }
  .page-sub { font-family: var(--mono); font-size: 11px; color: var(--text3); margin-top: 2px; }
  .scroll-table { max-height: 400px; overflow-y: auto; }
  .scroll-table::-webkit-scrollbar { width: 4px; }
  .scroll-table::-webkit-scrollbar-track { background: var(--surface2); }
  .scroll-table::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  .progress-bar { height: 3px; background: var(--surface3); border-radius: 2px; overflow: hidden; margin-top: 6px; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }
  .progress-fill.warn { background: var(--warn); }
  .progress-fill.danger { background: var(--danger); }
  textarea { resize: vertical; min-height: 80px; }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .detail-field { }
  .detail-label { font-family: var(--mono); font-size: 10px; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
  .detail-value { font-family: var(--mono); font-size: 13px; color: var(--text); }
  .divider { height: 1px; background: var(--border); margin: 16px 0; }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-mark">⬡ StockOS</div>
    <div class="logo-sub">v2.0 / Inventory</div>
  </div>
  <nav class="nav">
    <div class="nav-section">Main</div>
    <div class="nav-item active" onclick="navigate('dashboard')" id="nav-dashboard">
      <span class="nav-icon">◈</span> Dashboard
    </div>
    <div class="nav-item" onclick="navigate('products')" id="nav-products">
      <span class="nav-icon">▣</span> Products
    </div>
    <div class="nav-item" onclick="navigate('transactions')" id="nav-transactions">
      <span class="nav-icon">⇅</span> Transactions
    </div>
    <div class="nav-section">Config</div>
    <div class="nav-item" onclick="navigate('categories')" id="nav-categories">
      <span class="nav-icon">◫</span> Categories
    </div>
    <div class="nav-item" onclick="navigate('alerts')" id="nav-alerts">
      <span class="nav-icon">⚠</span> Low Stock Alerts
    </div>
  </nav>
  <div class="sidebar-footer">
    <div class="status-text">
      <span class="status-dot" id="status-dot"></span>
      <span id="status-text">Connecting...</span>
    </div>
  </div>
</aside>

<main class="main">
  <div class="topbar">
    <div class="page-title" id="topbar-title">Dashboard</div>
    <div class="topbar-right" id="topbar-actions"></div>
  </div>
  <div class="content" id="content">
    <div class="loading">Loading...</div>
  </div>
</main>

<div class="toast-container" id="toasts"></div>

<!-- MODALS -->
<div id="modal-container"></div>

<script>
const API = 'http://localhost:5000/api';
let currentPage = 'dashboard';
let categories = [];
let products = [];

// ── API HELPERS ──────────────────────────────────────────────────────────────

async function api(path, opts = {}) {
  try {
    const res = await fetch(API + path, {
      headers: { 'Content-Type': 'application/json' },
      ...opts
    });
    return await res.json();
  } catch (e) {
    return { success: false, error: 'Network error — is the Flask server running?' };
  }
}

// ── TOAST ────────────────────────────────────────────────────────────────────

function toast(msg, type = 'ok') {
  const el = document.createElement('div');
  el.className = `toast ${type === 'error' ? 'error' : type === 'warn' ? 'warn' : ''}`;
  const icons = { ok: '✓', error: '✗', warn: '⚠' };
  el.innerHTML = `<span style="color:${type==='ok'?'var(--accent)':type==='error'?'var(--danger)':'var(--warn)'}">${icons[type]||'•'}</span> ${msg}`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ── HEALTH CHECK ─────────────────────────────────────────────────────────────

async function checkHealth() {
  const res = await api('/health');
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-text');
  if (res.status === 'ok') {
    dot.style.background = 'var(--accent)';
    dot.style.boxShadow = '0 0 6px var(--accent)';
    txt.textContent = 'Connected';
  } else {
    dot.style.background = 'var(--danger)';
    dot.style.boxShadow = '0 0 6px var(--danger)';
    txt.textContent = 'Offline';
  }
}

// ── NAVIGATION ───────────────────────────────────────────────────────────────

function navigate(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById('nav-' + page);
  if (navEl) navEl.classList.add('active');
  const titles = { dashboard: 'Dashboard', products: 'Products', transactions: 'Transactions', categories: 'Categories', alerts: 'Low Stock Alerts' };
  document.getElementById('topbar-title').textContent = titles[page] || page;
  document.getElementById('topbar-actions').innerHTML = '';
  const pages = { dashboard: renderDashboard, products: renderProducts, transactions: renderTransactions, categories: renderCategories, alerts: renderAlerts };
  if (pages[page]) pages[page]();
}

// ── DASHBOARD ────────────────────────────────────────────────────────────────

async function renderDashboard() {
  document.getElementById('content').innerHTML = '<div class="loading">Loading dashboard...</div>';
  const res = await api('/dashboard');
  if (!res.success) { document.getElementById('content').innerHTML = `<div class="empty-state">${res.error}</div>`; return; }
  const s = res.stats;

  const stockStatus = pct => {
    if (pct <= 0) return ['badge-danger', 'OUT'];
    if (pct <= 50) return ['badge-warn', 'LOW'];
    return ['badge-ok', 'OK'];
  };

  document.getElementById('content').innerHTML = `
    <div class="stats-grid">
      <div class="stat-card" style="--accent-color: var(--accent)">
        <div class="stat-icon">▣</div>
        <div class="stat-label">Total Products</div>
        <div class="stat-value">${s.total_products}</div>
        <div class="stat-sub">SKUs in system</div>
      </div>
      <div class="stat-card" style="--accent-color: var(--warn)">
        <div class="stat-icon">⚠</div>
        <div class="stat-label">Low Stock</div>
        <div class="stat-value" style="color:var(--warn)">${s.low_stock}</div>
        <div class="stat-sub">Need reordering</div>
      </div>
      <div class="stat-card" style="--accent-color: var(--danger)">
        <div class="stat-icon">✗</div>
        <div class="stat-label">Out of Stock</div>
        <div class="stat-value" style="color:var(--danger)">${s.out_of_stock}</div>
        <div class="stat-sub">Zero inventory</div>
      </div>
      <div class="stat-card" style="--accent-color: var(--info)">
        <div class="stat-icon">$</div>
        <div class="stat-label">Inventory Value</div>
        <div class="stat-value" style="font-size:20px; color:var(--info)">$${Number(s.inventory_value).toLocaleString('en-US', {minimumFractionDigits:0, maximumFractionDigits:0})}</div>
        <div class="stat-sub">Retail: $${Number(s.retail_value).toLocaleString('en-US', {minimumFractionDigits:0, maximumFractionDigits:0})}</div>
      </div>
    </div>

    <div class="charts-grid">
      <div class="chart-card">
        <div class="chart-title">Stock Movement — Last 30 Days</div>
        <div class="chart-wrap"><canvas id="chart-movement"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Value by Category</div>
        <div class="chart-wrap"><canvas id="chart-category"></canvas></div>
      </div>
    </div>

    <div class="two-col">
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">⚠ Low Stock Alerts</span>
          <button class="btn btn-ghost" style="font-size:10px" onclick="navigate('alerts')">VIEW ALL</button>
        </div>
        <div class="scroll-table">
          <table>
            <thead><tr><th>Product</th><th>Qty</th><th>Reorder</th><th>Status</th></tr></thead>
            <tbody>
              ${res.low_stock_products.length === 0 ? '<tr><td colspan="4" style="text-align:center;color:var(--text3)">No alerts</td></tr>' :
                res.low_stock_products.map(p => {
                  const pct = p.reorder_level > 0 ? (p.quantity / p.reorder_level) * 100 : 0;
                  const [cls, label] = stockStatus(pct);
                  return `<tr>
                    <td><div class="product-name">${p.name}</div><div class="sku">${p.category_name||''}</div></td>
                    <td class="qty-cell" style="color:${p.quantity===0?'var(--danger)':'var(--warn)'}">${p.quantity}</td>
                    <td class="qty-cell" style="color:var(--text3)">${p.reorder_level}</td>
                    <td><span class="badge ${cls}">${label}</span></td>
                  </tr>`;
                }).join('')}
            </tbody>
          </table>
        </div>
      </div>
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">⇅ Recent Transactions</span>
          <button class="btn btn-ghost" style="font-size:10px" onclick="navigate('transactions')">VIEW ALL</button>
        </div>
        <div class="scroll-table">
          <table>
            <thead><tr><th>Product</th><th>Type</th><th>Qty</th><th>Date</th></tr></thead>
            <tbody>
              ${res.recent_transactions.length === 0 ? '<tr><td colspan="4" style="text-align:center;color:var(--text3)">No transactions</td></tr>' :
                res.recent_transactions.map(t => `<tr>
                  <td><div class="product-name">${t.product_name}</div><div class="sku">${t.sku}</div></td>
                  <td><span class="badge badge-${t.type.toLowerCase()}">${t.type}</span></td>
                  <td class="qty-cell">${t.type==='OUT'?'-':'+'} ${t.quantity}</td>
                  <td class="sku">${new Date(t.created_at).toLocaleDateString()}</td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  `;

  // Movement Chart
  const movCtx = document.getElementById('chart-movement').getContext('2d');
  const movData = res.movement_trend;
  new Chart(movCtx, {
    type: 'bar',
    data: {
      labels: movData.map(d => d.date ? new Date(d.date).toLocaleDateString('en', {month:'short',day:'numeric'}) : ''),
      datasets: [
        { label: 'Stock In', data: movData.map(d => d.stock_in), backgroundColor: 'rgba(0,229,160,0.5)', borderColor: 'rgba(0,229,160,0.8)', borderWidth: 1 },
        { label: 'Stock Out', data: movData.map(d => d.stock_out), backgroundColor: 'rgba(255,95,95,0.5)', borderColor: 'rgba(255,95,95,0.8)', borderWidth: 1 }
      ]
    },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#8fa0a0', font: { family: 'IBM Plex Mono', size: 10 } } } }, scales: { x: { ticks: { color: '#5a7070', font: { family: 'IBM Plex Mono', size: 9 } }, grid: { color: '#2a3333' } }, y: { ticks: { color: '#5a7070', font: { family: 'IBM Plex Mono', size: 9 } }, grid: { color: '#2a3333' } } } }
  });

  // Category Chart
  const catCtx = document.getElementById('chart-category').getContext('2d');
  const catData = res.category_breakdown.filter(c => (c.value||0) > 0);
  const colors = ['#00e5a0','#ffb547','#5b8fff','#ff5f5f','#c084fc','#38bdf8'];
  new Chart(catCtx, {

  });
}

// ── PRODUCTS ─────────────────────────────────────────────────────────────────

async function renderProducts() {
  const catRes = await api('/categories');
  categories = catRes.success ? catRes.data : [];
  document.getElementById('topbar-actions').innerHTML = `
    <button class="btn btn-primary" onclick="openProductModal()">+ ADD PRODUCT</button>
  `;
  document.getElementById('content').innerHTML = `
    <div class="toolbar">
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input type="text" placeholder="Search by name, SKU or supplier..." id="product-search" oninput="loadProducts()" />
      </div>
      <select id="cat-filter" onchange="loadProducts()" style="width:160px">
        <option value="">All Categories</option>
        ${categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('')}
      </select>
      <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-family:var(--mono);font-size:12px;color:var(--text2)">
        <input type="checkbox" id="low-stock-filter" onchange="loadProducts()" style="width:auto"> Low Stock
      </label>
    </div>
    <div class="panel">
      <div id="products-table-wrap" class="table-wrap">
        <div class="loading">Loading products...</div>
      </div>
    </div>
  `;
  loadProducts();
}

async function loadProducts() {
  const search = document.getElementById('product-search')?.value || '';
  const category = document.getElementById('cat-filter')?.value || '';
  const lowStock = document.getElementById('low-stock-filter')?.checked ? 'true' : '';
  let url = `/products?search=${encodeURIComponent(search)}&category=${category}`;
  if (lowStock) url += '&low_stock=true';
  const res = await api(url);
  if (!res.success) { document.getElementById('products-table-wrap').innerHTML = `<div class="empty-state">${res.error}</div>`; return; }
  products = res.data;
  if (products.length === 0) { document.getElementById('products-table-wrap').innerHTML = '<div class="empty-state">No products found</div>'; return; }

  document.getElementById('products-table-wrap').innerHTML = `
    <table>
      <thead>
        <tr>
          <th>SKU</th><th>Product</th><th>Category</th>
          <th>Qty</th><th>Unit Price</th><th>Cost</th>
          <th>Supplier</th><th>Location</th><th>Status</th><th></th>
        </tr>
      </thead>
      <tbody>
        ${products.map(p => {
          const pct = p.reorder_level > 0 ? (p.quantity / p.reorder_level) * 100 : 100;
          const [cls, label] = p.quantity === 0 ? ['badge-danger','OUT'] : pct <= 50 ? ['badge-warn','LOW'] : ['badge-ok','OK'];
          return `<tr onclick="viewProduct(${p.id})" style="cursor:pointer">
            <td class="sku">${p.sku}</td>
            <td class="product-name">${p.name}</td>
            <td><span class="tag">${p.category_name||'—'}</span></td>
            <td class="qty-cell" style="color:${p.quantity===0?'var(--danger)':pct<=50?'var(--warn)':'var(--accent)'}">${p.quantity}</td>
            <td class="price-cell">$${Number(p.unit_price).toFixed(2)}</td>
            <td class="price-cell" style="color:var(--text3)">$${Number(p.cost_price).toFixed(2)}</td>
            <td style="color:var(--text2)">${p.supplier||'—'}</td>
            <td class="sku">${p.location||'—'}</td>
            <td><span class="badge ${cls}">${label}</span></td>
            <td>
              <div class="product-row-actions" onclick="event.stopPropagation()">
                <button class="icon-btn" title="Stock In" onclick="openStockModal(${p.id},'IN','${p.name.replace(/'/g,"\\'")}',${p.quantity})">↑</button>
                <button class="icon-btn" title="Stock Out" onclick="openStockModal(${p.id},'OUT','${p.name.replace(/'/g,"\\'")}',${p.quantity})">↓</button>
                <button class="icon-btn" title="Edit" onclick="openProductModal(${p.id})">✎</button>
                <button class="icon-btn" title="Delete" onclick="deleteProduct(${p.id},'${p.name.replace(/'/g,"\\'")}')">✕</button>
              </div>
            </td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  `;
}

// ── PRODUCT MODAL ────────────────────────────────────────────────────────────

async function openProductModal(id = null) {
  let product = null;

    const res = await api('/products/' + id);
    if (res.success) product = res.data;
  }
  const title = id ? 'Edit Product' : 'Add New Product';
  const html = `
    <div class="modal-overlay" onclick="closeModal(event)">
      <div class="modal">
        <div class="modal-header">
          <span class="modal-title">${title}</span>
          <button class="modal-close" onclick="closeModal(null,true)">✕</button>
        </div>
        <div class="modal-body">
          <div class="form-grid">
            <div class="form-field">
              <label>SKU *</label>
              <input id="f-sku" value="${product?.sku||''}" placeholder="SKU-001" ${id?'readonly':''}>
            </div>
            <div class="form-field">
              <label>Category</label>
              <select id="f-cat">
                <option value="">— Select —</option>
                ${categories.map(c => `<option value="${c.id}" ${product?.category_id==c.id?'selected':''}>${c.name}</option>`).join('')}
              </select>
            </div>
            <div class="form-field full">
              <label>Product Name *</label>
              <input id="f-name" value="${product?.name||''}" placeholder="Product name">
            </div>
            <div class="form-field full">
              <label>Description</label>
              <textarea id="f-desc">${product?.description||''}</textarea>
            </div>
            <div class="form-field">
              <label>Unit Price ($) *</label>
              <input id="f-price" type="number" step="0.01" value="${product?.unit_price||''}" placeholder="0.00">
            </div>
            <div class="form-field">
              <label>Cost Price ($) *</label>
              <input id="f-cost" type="number" step="0.01" value="${product?.cost_price||''}" placeholder="0.00">
            </div>
            ${!id ? `
            <div class="form-field">
              <label>Initial Quantity</label>
              <input id="f-qty" type="number" value="0" min="0">
            </div>` : ''}
            <div class="form-field">
              <label>Reorder Level</label>
              <input id="f-reorder" type="number" value="${product?.reorder_level||10}" min="0">
            </div>
            <div class="form-field">
              <label>Supplier</label>
              <input id="f-supplier" value="${product?.supplier||''}" placeholder="Supplier name">
            </div>
            <div class="form-field">
              <label>Location</label>
              <input id="f-location" value="${product?.location||''}" placeholder="Shelf / Warehouse">
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-ghost" onclick="closeModal(null,true)">CANCEL</button>
          <button class="btn btn-primary" onclick="saveProduct(${id||'null'})">${id ? 'SAVE CHANGES' : 'ADD PRODUCT'}</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById('modal-container').innerHTML = html;
}

async function saveProduct(id) {
  const data = {
    sku: document.getElementById('f-sku').value.trim(),
    name: document.getElementById('f-name').value.trim(),
    description: document.getElementById('f-desc').value.trim(),
    category_id: document.getElementById('f-cat').value || null,
    unit_price: parseFloat(document.getElementById('f-price').value),
    cost_price: parseFloat(document.getElementById('f-cost').value),
    reorder_level: parseInt(document.getElementById('f-reorder').value),
    supplier: document.getElementById('f-supplier').value.trim(),
    location: document.getElementById('f-location').value.trim(),
  };
  if (!id) data.quantity = parseInt(document.getElementById('f-qty')?.value || 0);
  if (!data.sku || !data.name || isNaN(data.unit_price) || isNaN(data.cost_price)) {
    toast('Please fill required fields', 'error'); return;
  }
  const res = await api(id ? `/products/${id}` : '/products', { method: id ? 'PUT' : 'POST', body: JSON.stringify(data) });
  if (res.success) {
    toast(id ? 'Product updated' : 'Product added');
    closeModal(null, true);
    loadProducts();
  } else {
    toast(res.error || 'Error saving product', 'error');
  }
}

async function deleteProduct(id, name) {
  if (!confirm(`Delete "${name}"? This cannot be undone.`)) return;
  const res = await api(`/products/${id}`, { method: 'DELETE' });
  if (res.success) { toast('Product deleted'); loadProducts(); }
  else toast(res.error || 'Delete failed', 'error');
}

          <div class="detail-grid" style="margin-bottom:16px">
            <div class="detail-field"><div class="detail-label">Current Stock</div>
              <div class="detail-value" style="font-size:22px;color:${p.quantity===0?'var(--danger)':p.quantity<=p.reorder_level?'var(--warn)':'var(--accent)'}">${p.quantity}</div>

            <div class="detail-field"><div class="detail-label">Reorder Level</div><div class="detail-value">${p.reorder_level}</div></div>

            <div class="detail-field"><div class="detail-label">Cost Price</div><div class="detail-value">$${Number(p.cost_price).toFixed(2)} <span style="color:var(--accent);font-size:11px">${margin}% margin</span></div></div>
            <div class="detail-field"><div class="detail-label">Supplier</div><div class="detail-value">${p.supplier||'—'}</div></div>
            <div class="detail-field"><div class="detail-label">Location</div><div class="detail-value">${p.location||'—'}</div></div>
          </div>
          ${p.description ? `<div style="color:var(--text2);font-size:13px;margin-bottom:16px">${p.description}</div>` : ''}
          <div class="divider"></div>
          <div style="font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px">Recent Transactions</div>
          <div style="max-height:240px;overflow-y:auto">
            <table>
              <thead><tr><th>Type</th><th>Qty</th><th>Reference</th><th>Notes</th><th>Date</th></tr></thead>
              <tbody>
                ${txs.length===0?'<tr><td colspan="5" style="text-align:center;color:var(--text3)">No transactions yet</td></tr>':
                  txs.map(t=>`<tr>
                    <td><span class="badge badge-${t.type.toLowerCase()}">${t.type}</span></td>
                    <td class="qty-cell">${t.type==='OUT'?'-':'+'} ${t.quantity}</td>
                    <td class="sku">${t.reference||'—'}</td>
                    <td style="color:var(--text2);font-size:12px">${t.notes||'—'}</td>
                    <td class="sku">${new Date(t.created_at).toLocaleDateString()}</td>
                  </tr>`).join('')}
              </tbody>
            </table>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-ghost" onclick="closeModal(null,true)">CLOSE</button>
          <button class="btn btn-warn" onclick="closeModal(null,true);openStockModal(${p.id},'OUT','${p.name.replace(/'/g,"\\'")}',${p.quantity})">↓ STOCK OUT</button>

// ── STOCK TRANSACTION MODAL ──────────────────────────────────────────────────

function openStockModal(productId, type, productName, currentQty) {
  const colors = { IN: 'var(--accent)', OUT: 'var(--danger)', ADJUSTMENT: 'var(--info)' };
  const html = `
    <div class="modal-overlay" onclick="closeModal(event)">
      <div class="modal" style="width:420px">
        <div class="modal-header">
          <div>
            <div class="modal-title" style="color:${colors[type]}">${type === 'IN' ? '↑ STOCK IN' : type === 'OUT' ? '↓ STOCK OUT' : '⇄ ADJUSTMENT'}</div>
            <div style="font-family:var(--mono);font-size:11px;color:var(--text3);margin-top:3px">${productName}</div>
          </div>
          <button class="modal-close" onclick="closeModal(null,true)">✕</button>
        </div>
        <div class="modal-body">
          <div style="font-family:var(--mono);font-size:12px;color:var(--text2);margin-bottom:16px">
            Current stock: <span style="color:var(--accent);font-weight:600">${currentQty}</span>
          </div>
          <div class="form-grid">
            <div class="form-field">
              <label>Type</label>
              <select id="tx-type" onchange="updateTxType(this.value)">
                <option value="IN" ${type==='IN'?'selected':''}>Stock In</option>
                <option value="OUT" ${type==='OUT'?'selected':''}>Stock Out</option>
                <option value="ADJUSTMENT" ${type==='ADJUSTMENT'?'selected':''}>Adjustment</option>
              </select>
            </div>
            <div class="form-field">
              <label id="tx-qty-label">Quantity *</label>
              <input id="tx-qty" type="number" min="1" value="1" placeholder="0">
            </div>
            <div class="form-field full">
              <label>Reference</label>
              <input id="tx-ref" placeholder="PO#, Invoice#, etc.">
            </div>
            <div class="form-field full">
              <label>Notes</label>
              <textarea id="tx-notes" style="min-height:60px" placeholder="Optional notes..."></textarea>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-ghost" onclick="closeModal(null,true)">CANCEL</button>
          <button class="btn btn-primary" onclick="saveTransaction(${productId})">CONFIRM</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById('modal-container').innerHTML = html;
}

function updateTxType(type) {
  document.getElementById('tx-qty-label').textContent = type === 'ADJUSTMENT' ? 'New Quantity *' : 'Quantity *';
}

async function saveTransaction(productId) {
  const type = document.getElementById('tx-type').value;
  const qty = parseInt(document.getElementById('tx-qty').value);
  if (!qty || qty < 1) { toast('Enter a valid quantity', 'error'); return; }
  const data = {
    product_id: productId, type, quantity: qty,
    reference: document.getElementById('tx-ref').value.trim(),
    notes: document.getElementById('tx-notes').value.trim()
  };
  const res = await api('/transactions', { method: 'POST', body: JSON.stringify(data) });
  if (res.success) {
    toast(`Transaction recorded. New qty: ${res.new_quantity}`);
    closeModal(null, true);
    if (currentPage === 'products') loadProducts();
    else if (currentPage === 'dashboard') renderDashboard();
    else if (currentPage === 'alerts') renderAlerts();
  } else {
    toast(res.error || 'Transaction failed', 'error');
  }
}

// ── ALERTS ───────────────────────────────────────────────────────────────────

async function renderAlerts() {
  const res = await api('/products?low_stock=true');

  const items = res.data;

  document.getElementById('content').innerHTML = `
    <div style="margin-bottom:16px;display:flex;gap:12px">
      <div class="stat-card" style="flex:1;--accent-color:var(--danger)">
        <div class="stat-label">Out of Stock</div>
        <div class="stat-value" style="color:var(--danger)">${items.filter(p=>p.quantity===0).length}</div>
      </div>
      <div class="stat-card" style="flex:1;--accent-color:var(--warn)">
        <div class="stat-label">Low Stock</div>
        <div class="stat-value" style="color:var(--warn)">${items.filter(p=>p.quantity>0).length}</div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-header"><span class="panel-title">Products Needing Attention</span></div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>SKU</th><th>Product</th><th>Category</th><th>Current Qty</th><th>Reorder At</th><th>Stock Level</th><th>Action</th></tr></thead>
          <tbody>
            ${items.length === 0 ? '<tr><td colspan="7"><div class="empty-state" style="color:var(--accent)">✓ All products are well stocked</div></td></tr>' :
              items.map(p => {
                const pct = Math.min(100, p.reorder_level > 0 ? (p.quantity / p.reorder_level) * 100 : 0);
                const fillCls = p.quantity === 0 ? 'danger' : pct <= 30 ? 'danger' : 'warn';
                return `<tr>
                  <td class="sku">${p.sku}</td>
                  <td class="product-name">${p.name}</td>
                  <td><span class="tag">${p.category_name||'—'}</span></td>
                  <td class="qty-cell" style="color:${p.quantity===0?'var(--danger)':'var(--warn)'}">${p.quantity}</td>
                  <td class="qty-cell" style="color:var(--text3)">${p.reorder_level}</td>
                  <td style="width:120px">
                    <div class="progress-bar">
                      <div class="progress-fill ${fillCls}" style="width:${pct}%"></div>
                    </div>
                    <div class="sku" style="margin-top:3px">${pct.toFixed(0)}%</div>
                  </td>
                  <td><button class="btn btn-primary" style="font-size:10px;padding:5px 10px" onclick="openStockModal(${p.id},'IN','${p.name.replace(/'/g,"\\'")}',${p.quantity})">↑ RESTOCK</button></td>
                </tr>`;
              }).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

// ── MODAL CLOSE ───────────────────────────────────────────────────────────────

function closeModal(event, force = false) {
  if (force || (event && event.target.classList.contains('modal-overlay'))) {
    document.getElementById('modal-container').innerHTML = '';
  }
}

// ── INIT ──────────────────────────────────────────────────────────────────────

checkHealth();
setInterval(checkHealth, 30000);
navigate('dashboard');
</script>
